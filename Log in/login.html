<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Système de gestion des incidents informatiques</title>
<link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="page">
    <!-- LEFT: hero -->
    <section class="hero">
      <div class="hero-text">
        <h1>Système de gestion des<br>incidents informatiques</h1>
        <div class="rule"></div>
        <p>Une platforme centralisée pour déclarer, suivre et résoudre efficacement les incidents IT</p>
      </div>

      <div class="hero-art" aria-hidden="true">
        <img src="Assets/ship.png" alt="" />
      </div>
    </section>

    <!-- RIGHT: auth card -->
    <section class="auth">
      <div class="card">
        <h2>Bienvenue</h2>
        <p class="subtitle">Connectez vous a votre espace</p>

        <div id="loginForm">
          <label for="email">Email</label>
          <div class="field">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="email" id="email" name="email" placeholder="Entrez votre adresse mail" required>
          </div>

          <label for="password">Mot de passe</label>
          <div class="field">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
          </div>

          <div class="forgot"><a href="#">mot de passe oublié</a></div>

          <button type="button" id="btn" class="btn-login">Se connecter</button>
        </div>

        <p class="help">Besoin d'aide ? <a href="#">contacter le support</a></p>
      </div>
    </section>
  </div>

  <script src="login.js"></script>
</body>
</html>
